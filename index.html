<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CYBER TTT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050510;--panel:#0a0a1a;--card:#0f0f24;
  --neon-blue:#00d4ff;--neon-purple:#b400ff;--neon-pink:#ff006e;
  --neon-green:#00ff9f;--neon-amber:#ffb700;
  --text:#e0e8ff;--muted:#5566aa;
  --gb:0 0 8px #00d4ff88,0 0 20px #00d4ff44;
  --gp:0 0 8px #b400ff88,0 0 20px #b400ff44;
  --gg:0 0 8px #00ff9f88,0 0 20px #00ff9f44;
}
html,body{width:100%;height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;
  display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px 8px 32px;}
 
/* ── Canvas BG ── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
 
/* ── Layout ── */
.wrap{position:relative;z-index:1;width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;gap:18px}
 
/* ── Title ── */
.title{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(1.6rem,6vw,2.6rem);
  letter-spacing:.18em;text-align:center;
  background:linear-gradient(90deg,var(--neon-blue),var(--neon-purple),var(--neon-pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 12px #b400ff88);margin-top:8px}
.subtitle{font-size:.65rem;letter-spacing:.3em;color:var(--muted);text-align:center;margin-top:-6px}
 
/* ── Mode selector ── */
.mode-bar{display:flex;gap:8px;width:100%}
.mode-btn{flex:1;padding:9px 4px;background:var(--card);border:1px solid #1a1a3a;border-radius:8px;
  color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:.72rem;letter-spacing:.1em;
  cursor:pointer;transition:all .2s;text-transform:uppercase}
.mode-btn.active{border-color:var(--neon-blue);color:var(--neon-blue);box-shadow:var(--gb);background:#050520}
.mode-btn:hover:not(.active){border-color:#3344aa;color:var(--text)}
 
/* ── Difficulty ── */
.diff-bar{display:flex;gap:6px;width:100%}
.diff-btn{flex:1;padding:7px 4px;background:var(--card);border:1px solid #1a1a3a;border-radius:6px;
  color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:.68rem;letter-spacing:.08em;
  cursor:pointer;transition:all .2s;text-transform:uppercase}
.diff-btn.active.easy{border-color:var(--neon-green);color:var(--neon-green);box-shadow:var(--gg)}
.diff-btn.active.medium{border-color:var(--neon-amber);color:var(--neon-amber);box-shadow:0 0 8px #ffb70088}
.diff-btn.active.hard{border-color:var(--neon-pink);color:var(--neon-pink);box-shadow:0 0 8px #ff006e88}
.diff-btn.active.unbeatable{border-color:var(--neon-purple);color:var(--neon-purple);box-shadow:var(--gp)}
#diff-row{width:100%;display:flex;flex-direction:column;gap:6px}
#diff-label{font-size:.62rem;color:var(--muted);letter-spacing:.15em;text-align:center}
 
/* ── Score ── */
.scoreboard{display:flex;width:100%;gap:6px}
.score-cell{flex:1;background:var(--card);border:1px solid #1a1a3a;border-radius:10px;
  padding:10px 6px;text-align:center}
.score-lbl{font-size:.6rem;letter-spacing:.18em;color:var(--muted);margin-bottom:4px;text-transform:uppercase}
.score-num{font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:700}
.score-cell.x-cell .score-num{color:var(--neon-pink);text-shadow:0 0 10px #ff006e88}
.score-cell.draw-cell .score-num{color:var(--muted)}
.score-cell.o-cell .score-num{color:var(--neon-blue);text-shadow:0 0 10px #00d4ff88}
 
/* ── Status ── */
.status-box{width:100%;background:var(--card);border:1px solid #1a1a3a;border-radius:10px;
  padding:12px 16px;text-align:center;font-size:.82rem;letter-spacing:.1em;
  transition:color .3s,border-color .3s,box-shadow .3s;min-height:48px;
  display:flex;align-items:center;justify-content:center;gap:10px}
.status-box .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:blink 1s ease infinite}
.status-box.x-turn{border-color:#ff006e55;color:var(--neon-pink)}
.status-box.x-turn .dot{background:var(--neon-pink);box-shadow:0 0 8px var(--neon-pink)}
.status-box.o-turn{border-color:#00d4ff55;color:var(--neon-blue)}
.status-box.o-turn .dot{background:var(--neon-blue);box-shadow:0 0 8px var(--neon-blue)}
.status-box.win{border-color:#00ff9f55;color:var(--neon-green)}
.status-box.win .dot{background:var(--neon-green);box-shadow:0 0 8px var(--neon-green)}
.status-box.draw{border-color:#ffb70055;color:var(--neon-amber)}
.status-box.draw .dot{background:var(--neon-amber);box-shadow:0 0 8px var(--neon-amber)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
 
/* ── Board ── */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;position:relative}
 
/* Winning line */
#win-line{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
 
.cell{aspect-ratio:1;background:var(--card);border:1px solid #1a1a3a;border-radius:14px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .15s,border-color .2s,transform .1s,box-shadow .25s;
  position:relative;overflow:hidden;user-select:none}
.cell::before{content:'';position:absolute;inset:0;border-radius:14px;
  background:radial-gradient(circle at 50% 50%,rgba(0,212,255,.07),transparent 70%);
  opacity:0;transition:opacity .2s}
.cell:hover:not(.taken):not(.frozen)::before{opacity:1}
.cell:hover:not(.taken):not(.frozen){border-color:var(--neon-blue);
  box-shadow:var(--gb);transform:scale(1.04)}
 
.cell-inner{font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(1.8rem,8vw,2.8rem);transition:all .2s;opacity:0;transform:scale(.4) rotate(-20deg)}
.cell.taken .cell-inner{opacity:1;transform:scale(1) rotate(0)}
.cell.X .cell-inner{color:var(--neon-pink);text-shadow:0 0 14px var(--neon-pink),0 0 28px #ff006e66}
.cell.O .cell-inner{color:var(--neon-blue);text-shadow:0 0 14px var(--neon-blue),0 0 28px #00d4ff66}
.cell.X{border-color:#ff006e44}
.cell.O{border-color:#00d4ff44}
.cell.winner{animation:winPulse 1.2s ease infinite}
.cell.winner.X{border-color:var(--neon-pink);box-shadow:0 0 18px #ff006eaa,inset 0 0 30px #ff006e18}
.cell.winner.O{border-color:var(--neon-blue);box-shadow:0 0 18px #00d4ffaa,inset 0 0 30px #00d4ff18}
 
.cell .num-hint{position:absolute;top:6px;left:8px;font-size:.6rem;color:#1e1e3a;pointer-events:none}
 
@keyframes winPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.75;transform:scale(1.03)}}
@keyframes cellPop{0%{transform:scale(.3) rotate(-30deg);opacity:0}
  60%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.cell.pop .cell-inner{animation:cellPop .3s cubic-bezier(.34,1.56,.64,1) forwards}
 
/* ── Buttons ── */
.btn-row{display:flex;gap:10px;width:100%}
.btn{flex:1;padding:12px;background:var(--card);border:1px solid #1a1a3a;border-radius:10px;
  color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.78rem;letter-spacing:.12em;
  text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn:hover{background:#0d0d28;border-color:var(--neon-purple);box-shadow:var(--gp);color:var(--neon-purple)}
.btn.primary{border-color:var(--neon-blue);color:var(--neon-blue)}
.btn.primary:hover{background:#04102a;box-shadow:var(--gb)}
.btn.sound-btn{flex:0 0 auto;padding:12px 14px}
 
/* ── Confetti ── */
.confetti-piece{position:fixed;top:-10px;border-radius:2px;pointer-events:none;z-index:9999;
  animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
 
/* ── History panel ── */
.history{width:100%;background:var(--card);border:1px solid #1a1a3a;border-radius:10px;padding:12px 14px}
.history-title{font-size:.6rem;letter-spacing:.2em;color:var(--muted);margin-bottom:8px;text-transform:uppercase}
.history-list{display:flex;flex-wrap:wrap;gap:6px;max-height:60px;overflow:hidden}
.hist-chip{font-size:.65rem;padding:3px 10px;border-radius:20px;letter-spacing:.06em}
.hist-chip.win{background:#00ff9f18;border:1px solid #00ff9f44;color:var(--neon-green)}
.hist-chip.loss{background:#ff006e18;border:1px solid #ff006e44;color:var(--neon-pink)}
.hist-chip.draw{background:#ffb70018;border:1px solid #ffb70044;color:var(--neon-amber)}
 
/* ── Responsive ── */
@media(max-width:400px){
  .title{font-size:1.4rem}
  .mode-btn,.diff-btn{font-size:.62rem;padding:7px 2px}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
 
<div class="wrap" role="main">
  <h1 class="title">CYBER<span style="color:var(--neon-purple);-webkit-text-fill-color:initial">///</span>TTT</h1>
  <p class="subtitle">NEURAL GRID v2.077</p>
 
  <!-- Mode -->
  <div class="mode-bar" role="group" aria-label="Game mode">
    <button class="mode-btn active" id="btn-2p" onclick="setMode('2p')">⚔ 2 PLAYER</button>
    <button class="mode-btn" id="btn-ai" onclick="setMode('ai')">🤖 VS AI</button>
  </div>
 
  <!-- Difficulty (AI only) -->
  <div id="diff-row" style="display:none">
    <div class="diff-label" id="diff-label">DIFFICULTY</div>
    <div class="diff-bar" role="group" aria-label="AI difficulty">
      <button class="diff-btn easy active" id="d-easy" onclick="setDiff('easy')">EASY</button>
      <button class="diff-btn medium" id="d-medium" onclick="setDiff('medium')">MED</button>
      <button class="diff-btn hard" id="d-hard" onclick="setDiff('hard')">HARD</button>
      <button class="diff-btn unbeatable" id="d-unb" onclick="setDiff('unbeatable')">∞</button>
    </div>
  </div>
 
  <!-- Scoreboard -->
  <div class="scoreboard" aria-label="Scoreboard">
    <div class="score-cell x-cell">
      <div class="score-lbl" id="x-label">X</div>
      <div class="score-num" id="score-x">0</div>
    </div>
    <div class="score-cell draw-cell">
      <div class="score-lbl">DRAWS</div>
      <div class="score-num" id="score-d">0</div>
    </div>
    <div class="score-cell o-cell">
      <div class="score-lbl" id="o-label">O</div>
      <div class="score-num" id="score-o">0</div>
    </div>
  </div>
 
  <!-- Status -->
  <div class="status-box x-turn" id="status" aria-live="polite">
    <span class="dot"></span>
    <span id="status-text">X — MAKE YOUR MOVE</span>
  </div>
 
  <!-- Board -->
  <div class="board" id="board" role="grid" aria-label="Game board">
    <svg id="win-line" viewBox="0 0 300 300" preserveAspectRatio="none" aria-hidden="true">
      <line id="wl" x1="0" y1="0" x2="0" y2="0" stroke="none" stroke-width="4"
        stroke-linecap="round" opacity="0" style="transition:opacity .4s"/>
    </svg>
  </div>
 
  <!-- Controls -->
  <div class="btn-row">
    <button class="btn primary" onclick="newGame()">▶ NEW GAME</button>
    <button class="btn" onclick="resetScores()">↺ RESET</button>
    <button class="btn sound-btn" id="sound-btn" onclick="toggleSound()" aria-label="Toggle sound">🔊</button>
  </div>
 
  <!-- Match history -->
  <div class="history" aria-label="Match history">
    <div class="history-title">⬡ MATCH LOG</div>
    <div class="history-list" id="hist-list"><span style="font-size:.65rem;color:var(--muted)">No matches yet</span></div>
  </div>
</div>
 
<script>
/* ══════════════════════════════
   PARTICLE BACKGROUND
══════════════════════════════ */
const canvas=document.getElementById('bg-canvas');
const ctx=canvas.getContext('2d');
let W,H,particles=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;initParticles()}
function initParticles(){
  particles=[];
  const n=Math.floor((W*H)/14000);
  for(let i=0;i<n;i++) particles.push(mkP());
}
function mkP(){
  return{x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
    r:Math.random()*1.5+.5,
    c:Math.random()<.5?'#00d4ff':'#b400ff',
    a:Math.random()*.5+.1}
}
function animBG(){
  ctx.clearRect(0,0,W,H);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.c.replace(')',`,${p.a})`).replace('rgb','rgba').replace('#','').replace(/^([0-9a-f]{6})(.*)$/i,(_,h,r)=>{
      const n=parseInt(h,16);
      return`rgba(${n>>16},${n>>8&255},${n&255},${p.a})`
    });
    ctx.fill();
  });
  /* Connection lines */
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      const dx=particles[i].x-particles[j].x;
      const dy=particles[i].y-particles[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<100){
        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle=`rgba(0,212,255,${.08*(1-d/100)})`;
        ctx.lineWidth=.5;ctx.stroke();
      }
    }
  }
  requestAnimationFrame(animBG);
}
window.addEventListener('resize',resize);
resize();animBG();
 
/* ══════════════════════════════
   SOUND ENGINE (Web Audio API)
══════════════════════════════ */
let soundOn=true;
let ac=null;
function getAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac}
function playTone(freq,type,dur,vol=.15){
  if(!soundOn)return;
  try{
    const a=getAC();
    const osc=a.createOscillator();
    const gain=a.createGain();
    osc.connect(gain);gain.connect(a.destination);
    osc.type=type;osc.frequency.value=freq;
    gain.gain.setValueAtTime(vol,a.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,a.currentTime+dur);
    osc.start();osc.stop(a.currentTime+dur);
  }catch(e){}
}
function sfxMove(){playTone(440,'sine',.1)}
function sfxWin(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,'square',.18,.1),i*80));
}
function sfxDraw(){playTone(300,'sawtooth',.4,.08)}
function sfxBad(){playTone(200,'sawtooth',.15,.1)}
function toggleSound(){
  soundOn=!soundOn;
  document.getElementById('sound-btn').textContent=soundOn?'🔊':'🔇';
}
 
/* ══════════════════════════════
   GAME STATE
══════════════════════════════ */
let board=Array(9).fill(null);
let currentPlayer='X';
let gameOver=false;
let mode='2p';
let diff='easy';
let aiPlayer='X'; /* AI is always X in AI mode — human is O */
let scores={X:0,O:0,D:0};
let history=[];
let thinking=false;
 
const WIN_COMBOS=[
  [0,1,2],[3,4,5],[6,7,8], // rows
  [0,3,6],[1,4,7],[2,5,8], // cols
  [0,4,8],[2,4,6]          // diags
];
 
/* ══════════════════════════════
   MODE / DIFF SELECTORS
══════════════════════════════ */
function setMode(m){
  mode=m;
  document.getElementById('btn-2p').classList.toggle('active',m==='2p');
  document.getElementById('btn-ai').classList.toggle('active',m==='ai');
  document.getElementById('diff-row').style.display=m==='ai'?'flex':'none';
  if(m==='ai'){
    document.getElementById('x-label').textContent='CPU';
    document.getElementById('o-label').textContent='YOU';
  } else {
    document.getElementById('x-label').textContent='X';
    document.getElementById('o-label').textContent='O';
  }
  newGame();
}
function setDiff(d){
  diff=d;
  ['easy','medium','hard','unbeatable'].forEach(k=>{
    const el=document.getElementById('d-'+k);
    if(el)el.classList.toggle('active',k===d);
  });
  newGame();
}
 
/* ══════════════════════════════
   BOARD RENDERING
══════════════════════════════ */
function renderBoard(){
  const el=document.getElementById('board');
  // keep the win-line svg
  const wlSvg=document.getElementById('win-line');
  el.innerHTML='';
  el.appendChild(wlSvg);
  for(let i=0;i<9;i++){
    const cell=document.createElement('div');
    cell.className='cell';
    cell.setAttribute('role','gridcell');
    cell.setAttribute('aria-label',`Cell ${i+1}${board[i]?' occupied by '+board[i]:''}`);
    const hint=document.createElement('span');
    hint.className='num-hint';
    hint.textContent=i+1;
    cell.appendChild(hint);
    const inner=document.createElement('div');
    inner.className='cell-inner';
    if(board[i]){
      cell.classList.add('taken',board[i]);
      inner.textContent=board[i];
    }
    cell.appendChild(inner);
    cell.addEventListener('click',()=>handleClick(i));
    el.appendChild(cell);
  }
}
 
function getCells(){return document.getElementById('board').querySelectorAll('.cell')}
 
function animateCell(idx){
  const cells=getCells();
  cells[idx].classList.add('pop');
  setTimeout(()=>cells[idx].classList.remove('pop'),400);
}
 
/* ══════════════════════════════
   STATUS HELPER
══════════════════════════════ */
function setStatus(cls,msg){
  const box=document.getElementById('status');
  box.className='status-box '+cls;
  document.getElementById('status-text').textContent=msg;
}
 
/* ══════════════════════════════
   WIN CHECK
══════════════════════════════ */
function checkWinner(b){
  for(const [a,c,d] of WIN_COMBOS){
    if(b[a]&&b[a]===b[c]&&b[a]===b[d]) return{winner:b[a],combo:[a,c,d]};
  }
  if(b.every(x=>x)) return{winner:'draw',combo:[]};
  return null;
}
 
/* ══════════════════════════════
   WIN LINE
══════════════════════════════ */
function drawWinLine(combo){
  if(!combo||!combo.length)return;
  const boardEl=document.getElementById('board');
  const cells=getCells();
  const bRect=boardEl.getBoundingClientRect();
  const r1=cells[combo[0]].getBoundingClientRect();
  const r2=cells[combo[2]].getBoundingClientRect();
  const cx1=r1.left-bRect.left+r1.width/2;
  const cy1=r1.top-bRect.top+r1.height/2;
  const cx2=r2.left-bRect.left+r2.width/2;
  const cy2=r2.top-bRect.top+r2.height/2;
  const W=bRect.width,H=bRect.height;
  const wl=document.getElementById('wl');
  const svg=document.getElementById('win-line');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  wl.setAttribute('x1',cx1);wl.setAttribute('y1',cy1);
  wl.setAttribute('x2',cx2);wl.setAttribute('y2',cy2);
  const col=board[combo[0]]==='X'?'#ff006e':'#00d4ff';
  wl.setAttribute('stroke',col);
  wl.setAttribute('stroke-width','5');
  wl.style.opacity='1';
  wl.style.filter=`drop-shadow(0 0 8px ${col})`;
}
 
function clearWinLine(){
  const wl=document.getElementById('wl');
  wl.style.opacity='0';
  wl.setAttribute('stroke','none');
}
 
/* ══════════════════════════════
   HIGHLIGHT WINNERS
══════════════════════════════ */
function highlightWinners(combo){
  const cells=getCells();
  combo.forEach(i=>cells[i].classList.add('winner'));
}
 
/* ══════════════════════════════
   CONFETTI
══════════════════════════════ */
function launchConfetti(){
  const colors=['#00d4ff','#b400ff','#ff006e','#00ff9f','#ffb700'];
  for(let i=0;i<80;i++){
    const d=document.createElement('div');
    d.className='confetti-piece';
    const size=Math.random()*8+4;
    d.style.cssText=`
      left:${Math.random()*100}vw;
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${Math.random()*2+1.5}s;
      animation-delay:${Math.random()*.5}s;
      opacity:${Math.random()*.8+.2};
      transform:rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),3500);
  }
}
 
/* ══════════════════════════════
   CLICK HANDLER
══════════════════════════════ */
function handleClick(idx){
  if(gameOver||thinking||board[idx]) return;
  /* In AI mode, only allow clicks when it's the human's turn */
  if(mode==='ai'&&currentPlayer!==humanPlayer) return;
  makeMove(idx,currentPlayer);
}
 
function makeMove(idx,player){
  board[idx]=player;
  renderBoard();
  animateCell(idx);
  sfxMove();
  const result=checkWinner(board);
  if(result){endGame(result);return;}
  currentPlayer=currentPlayer==='X'?'O':'X';
  updateTurnStatus();
  /* Trigger AI move if it's now AI's turn */
  if(mode==='ai'&&currentPlayer===aiPlayer&&!gameOver){
    thinking=true;
    setStatus('x-turn','AI CALCULATING...');
    setTimeout(aiMove,450+Math.random()*300);
  }
}
 
function updateTurnStatus(){
  if(gameOver)return;
  if(mode==='2p'){
    const cls=currentPlayer==='X'?'x-turn':'o-turn';
    setStatus(cls,`${currentPlayer} — MAKE YOUR MOVE`);
  } else {
    if(currentPlayer===aiPlayer){
      setStatus('x-turn','AI CALCULATING...');
    } else {
      setStatus('o-turn','YOUR MOVE, HUMAN [O]');
    }
  }
}
 
/* ══════════════════════════════
   END GAME
══════════════════════════════ */
function endGame(result){
  gameOver=true;
  if(result.winner==='draw'){
    sfxDraw();
    scores.D++;
    document.getElementById('score-d').textContent=scores.D;
    setStatus('draw','◈ NEURAL STALEMATE');
    history.unshift('draw');
  } else {
    sfxWin();
    scores[result.winner]++;
    document.getElementById(`score-${result.winner.toLowerCase()}`).textContent=scores[result.winner];
    highlightWinners(result.combo);
    setTimeout(()=>drawWinLine(result.combo),50);
    if(mode==='2p'){
      setStatus('win',`◈ PLAYER ${result.winner} WINS!`);
      history.unshift(result.winner==='X'?'X':'O');
    } else {
      const humanWon=result.winner!==aiPlayer;
      setStatus('win',humanWon?'◈ YOU WIN, HUMAN!':'◈ AI DOMINATES');
      history.unshift(humanWon?'win':'loss');
      if(humanWon)launchConfetti();
    }
  }
  updateHistory();
  /* freeze cells */
  getCells().forEach(c=>c.classList.add('frozen'));
}
 
/* ══════════════════════════════
   HISTORY
══════════════════════════════ */
function updateHistory(){
  const el=document.getElementById('hist-list');
  if(!history.length){el.innerHTML='<span style="font-size:.65rem;color:var(--muted)">No matches yet</span>';return;}
  el.innerHTML=history.slice(0,12).map(h=>{
    if(h==='draw')return`<span class="hist-chip draw">DRAW</span>`;
    if(h==='win') return`<span class="hist-chip win">WIN</span>`;
    if(h==='loss')return`<span class="hist-chip loss">LOSS</span>`;
    return`<span class="hist-chip win">${h} WINS</span>`;
  }).join('');
}
 
/* ══════════════════════════════
   AI — MINIMAX
══════════════════════════════ */
function aiMove(){
  thinking=false;
  const move=getAIMove();
  if(move!==-1) makeMove(move,aiPlayer);
}
 
function getAIMove(){
  const free=board.map((v,i)=>v?-1:i).filter(i=>i>=0);
  if(!free.length)return -1;
  if(diff==='easy') return free[Math.floor(Math.random()*free.length)];
  if(diff==='medium'){
    /* 60% minimax, 40% random */
    if(Math.random()<.4)return free[Math.floor(Math.random()*free.length)];
    return bestMoveMinmax(0);
  }
  if(diff==='hard'){
    /* 85% minimax */
    if(Math.random()<.15)return free[Math.floor(Math.random()*free.length)];
    return bestMoveMinmax(0);
  }
  /* unbeatable: full minimax */
  return bestMoveMinmax(0);
}
 
function bestMoveMinmax(){
  let best=-Infinity,move=-1;
  board.forEach((v,i)=>{
    if(v)return;
    board[i]=aiPlayer;
    const score=minimax(board,0,false);
    board[i]=null;
    if(score>best){best=score;move=i;}
  });
  return move;
}
 
const humanPlayer='O'; /* Human=O, AI=X always in AI mode */
function minimax(b,depth,isMax){
  const res=checkWinner(b);
  if(res){
    if(res.winner===aiPlayer) return 10-depth;
    if(res.winner===humanPlayer) return depth-10;
    return 0; /* draw */
  }
  const free=b.map((v,i)=>v?-1:i).filter(i=>i>=0);
  if(!free.length) return 0;
  if(isMax){
    let best=-Infinity;
    free.forEach(i=>{b[i]=aiPlayer;best=Math.max(best,minimax(b,depth+1,false));b[i]=null;});
    return best;
  } else {
    let best=Infinity;
    free.forEach(i=>{b[i]=humanPlayer;best=Math.min(best,minimax(b,depth+1,true));b[i]=null;});
    return best;
  }
}
 
/* ══════════════════════════════
   NEW GAME / RESET
══════════════════════════════ */
function newGame(){
  board=Array(9).fill(null);
  currentPlayer='X'; /* X always starts */
  gameOver=false;
  thinking=false;
  clearWinLine();
  renderBoard();
  if(mode==='2p'){
    setStatus('x-turn','X — MAKE YOUR MOVE');
  } else {
    /* AI is X and goes first automatically */
    thinking=true;
    setStatus('x-turn','AI CALCULATING...');
    setTimeout(aiMove, 600);
  }
}
 
function resetScores(){
  scores={X:0,O:0,D:0};
  document.getElementById('score-x').textContent='0';
  document.getElementById('score-o').textContent='0';
  document.getElementById('score-d').textContent='0';
  history=[];
  updateHistory();
  newGame();
}
 
/* Init */
renderBoard();
setStatus('x-turn','X — MAKE YOUR MOVE');
</script>
